name: Busca Diária - Licitações Aeronáutica (PNCP)

on:
  schedule:
    # 09:00 horário de Brasília = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: # permite execução manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buscar-licitacoes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar robô de busca
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/pncp_aeronautica.py

      - name: Upload resultado como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-licitacoes-${{ github.run_id }}
          path: |
            resultado_*.json
            resultado_*.html
          retention-days: 30
          if-no-files-found: ignore
